name: Test
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    permissions:
      contents: read

    strategy:
      matrix:
        module: [".", "modbus", "mqtt", "ws"]

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"
          cache: true

      - name: Test ${{ matrix.module }}
        run: |
          cd ${{ matrix.module }}
          go test -v -race ./...
