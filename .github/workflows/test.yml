name: Test
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        module: [".", "modbus", "ws"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      - name: Test ${{ matrix.module }}
        run: |
          cd ${{ matrix.module }}
          go test -v -race ./...
